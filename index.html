<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AA_GEN — Gekiga Full Stack</title>
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { getFirestore, collection, addDoc, query, where, getDocs, serverTimestamp, orderBy } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyBO6zoUHt2TteX22WKFXaxC0wAzh8lEgtQ",
    authDomain: "aa--generator.firebaseapp.com",
    projectId: "aa--generator",
    storageBucket: "aa--generator.firebasestorage.app",
    messagingSenderId: "400807317542",
    appId: "1:400807317542:web:85905aa007f22aa97a96e7",
    measurementId: "G-QTS2JNGGK1"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  window._state = { user: null, projects: [] };

  onAuthStateChanged(auth, user => {
    window._state.user = user;
    const btn = document.getElementById('authBtn');
    const uinfo = document.getElementById('uinfo');
    if (user) {
      btn.textContent = 'ログアウト';
      uinfo.innerHTML = `<img src="${user.photoURL}" style="width:24px;border-radius:50%"> ${user.displayName}`;
      loadGallery();
    } else {
      btn.textContent = 'Googleでログイン';
      uinfo.innerHTML = '';
      document.getElementById('grid').innerHTML = '<div style="padding:20px;color:#5a5a80;">ログインすると保存した作品が表示されます</div>';
    }
  });

  window.handleAuth = () => window._state.user ? signOut(auth) : signInWithPopup(auth, new GoogleAuthProvider());

  window.saveArt = async () => {
    if (!window._state.user) return alert("ログインしてください");
    const name = prompt("作品名を入力してください");
    if (!name) return;
    try {
      await addDoc(collection(db, "projects"), {
        uid: window._state.user.uid,
        name: name,
        ascii: document.getElementById('aout').textContent,
        createdAt: serverTimestamp(),
        settings: { ws: document.getElementById('ws').value, egs: document.getElementById('egs').value }
      });
      alert("保存しました");
      loadGallery();
    } catch (e) { alert("保存に失敗しました"); }
  };

  async function loadGallery() {
    const q = query(collection(db, "projects"), where("uid", "==", window._state.user.uid), orderBy("createdAt", "desc"));
    const snap = await getDocs(q);
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    snap.forEach(doc => {
      const p = doc.data();
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `<div class="card-name">${p.name}</div><pre class="card-pre">${p.ascii.substring(0,80)}...</pre>`;
      card.onclick = () => { document.getElementById('aout').textContent = p.ascii; switchTab('editor'); };
      grid.appendChild(card);
    });
  }
</script>
<style>
  :root { --bg: #050508; --s1: #0f0f18; --border: #202030; --acc: #7affb2; --text: #dde0f0; }
  body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
  
  header { display: flex; align-items: center; padding: 0 20px; height: 50px; background: var(--s1); border-bottom: 1px solid var(--border); gap: 15px; }
  .tabs { display: flex; background: #000; border-radius: 6px; padding: 3px; border: 1px solid var(--border); }
  .tab { padding: 5px 15px; border: none; background: none; color: #5a5a80; cursor: pointer; font-size: 12px; font-weight: bold; }
  .tab.active { background: var(--s1); color: var(--text); border-radius: 4px; }
  
  .view { flex: 1; display: none; overflow: hidden; }
  .view.active { display: flex; }

  /* Editor */
  .side { width: 280px; background: var(--s1); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; gap: 20px; }
  .main-out { flex: 1; background: #000; display: flex; flex-direction: column; overflow: hidden; }
  #aout { font-family: 'Courier New', monospace; font-size: 8px; line-height: 0.82; white-space: pre; color: #fff; letter-spacing: -1px; margin: 0; padding: 20px; }
  
  .label { font-size: 10px; font-weight: bold; color: #5a5a80; letter-spacing: 1px; }
  input[type=range] { width: 100%; accent-color: var(--acc); }
  .btn { background: var(--acc); color: #000; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; }
  
  /* Gallery */
  #gallery { padding: 30px; overflow-y: auto; display: block; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
  .card { background: var(--s1); border: 1px solid var(--border); padding: 15px; border-radius: 10px; cursor: pointer; }
  .card-name { font-weight: bold; margin-bottom: 8px; font-size: 13px; }
  .card-pre { font-size: 3px; line-height: 1; height: 50px; overflow: hidden; background: #000; padding: 5px; color: #555; }
</style>
</head>
<body>

<header>
  <div style="font-weight:bold; color:var(--acc);">AA_GEN v2.5</div>
  <div class="tabs">
    <button class="tab active" id="t-gallery" onclick="switchTab('gallery')">コレクション</button>
    <button class="tab" id="t-editor" onclick="switchTab('editor')">エディター</button>
  </div>
  <div style="flex:1"></div>
  <div id="uinfo" style="display:flex; align-items:center; gap:8px; font-size:12px;"></div>
  <button id="authBtn" class="btn" style="width:auto; padding:5px 12px;" onclick="handleAuth()">ログイン</button>
</header>

<div id="gallery" class="view active">
  <h2 style="margin-bottom:20px;">マイギャラリー</h2>
  <div id="grid" class="grid"></div>
</div>

<div id="editor" class="view">
  <div class="side">
    <div>
      <div class="label">画像選択</div>
      <input type="file" id="fi" accept="image/*" style="font-size:11px; margin-top:8px;">
    </div>
    <div>
      <div class="label">解像度 (幅)</div>
      <input type="range" id="ws" min="50" max="300" value="120">
    </div>
    <div>
      <div class="label">劇画エッジ (輪郭)</div>
      <input type="range" id="egs" min="50" max="250" value="160">
    </div>
    <div>
      <div class="label">密度 (ガンマ)</div>
      <input type="range" id="gms" min="20" max="150" value="60">
    </div>
    <button class="btn" onclick="saveArt()">作品を保存</button>
  </div>
  <div class="main-out" style="overflow:auto;">
    <pre id="aout"></pre>
  </div>
</div>

<canvas id="cv" style="display:none"></canvas>

<script>
  const CHARS = "$@B%8&WM#*oahkbdpqwmZO0QLCJUYXzcvunxrjft/\\|()1{}[]?-_+~<>i!lI;:,\"^`'. ".split("");
  let currentImg = null;

  function switchTab(id) {
    document.querySelectorAll('.view, .tab').forEach(el => el.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.getElementById('t-' + id).classList.add('active');
  }

  document.getElementById('fi').onchange = e => {
    const r = new FileReader();
    r.onload = ev => {
      currentImg = new Image();
      currentImg.onload = render;
      currentImg.src = ev.target.result;
    };
    r.readAsDataURL(e.target.files[0]);
  };

  ['ws', 'egs', 'gms'].forEach(id => document.getElementById(id).oninput = render);

  function render() {
    if (!currentImg) return;
    const canvas = document.getElementById('cv');
    const ctx = canvas.getContext('2d');
    const W = +document.getElementById('ws').value;
    const edgeStr = +document.getElementById('egs').value;
    const gamma = +document.getElementById('gms').value / 100;
    const H = Math.round(W * (currentImg.height / currentImg.width) * 0.54);
    canvas.width = W; canvas.height = H;

    ctx.filter = `contrast(180%) grayscale(100%) brightness(85%)`;
    ctx.drawImage(currentImg, 0, 0, W, H);
    const src = ctx.getImageData(0, 0, W, H);
    const data = src.data;

    const edges = new Float32Array(W * H);
    for (let y = 1; y < H - 1; y++) {
      for (let x = 1; x < W - 1; x++) {
        const i = (y * W + x) * 4;
        const gx = -data[((y-1)*W+x-1)*4] + data[((y-1)*W+x+1)*4] - 2*data[(y*W+x-1)*4] + 2*data[(y*W+x+1)*4];
        const gy = -data[((y-1)*W+x-1)*4] - 2*data[((y-1)*W+x)*4] + data[((y+1)*W+x-1)*4] + 2*data[((y+1)*W+x)*4];
        edges[y * W + x] = Math.sqrt(gx*gx + gy*gy);
      }
    }

    let res = "";
    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {
        const i = y * W + x;
        const lum = data[i * 4];
        const e = edges[i];
        let cIdx;
        if (e > (255 - edgeStr)) {
          cIdx = 0; 
        } else {
          const v = Math.pow(lum / 255, gamma);
          cIdx = Math.floor(v * (CHARS.length - 1));
        }
        res += CHARS[cIdx];
      }
      res += "\n";
    }
    document.getElementById('aout').textContent = res;
  }
</script>
</body>
</html>
